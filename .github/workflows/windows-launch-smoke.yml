name: Windows Launch Smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - name: Download latest portable zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $api = 'https://api.github.com/repos/LBaquero33/selfscout-baseball-desktop-updates/releases/latest'
          $release = Invoke-RestMethod -Uri $api -Headers @{ 'User-Agent' = 'selfscout-smoke' }

          $zipAsset = $release.assets | Where-Object { $_.name -match '-x64\.zip$' } | Select-Object -First 1
          if (-not $zipAsset) { throw 'Could not find x64 zip asset in latest release' }

          Write-Host "Latest tag: $($release.tag_name)"
          Write-Host "Downloading asset: $($zipAsset.name)"

          $zipOut = Join-Path $env:RUNNER_TEMP $zipAsset.name
          Invoke-WebRequest -Uri $zipAsset.browser_download_url -OutFile $zipOut -UseBasicParsing

          $extractDir = Join-Path $env:RUNNER_TEMP 'selfscout-smoke'
          if (Test-Path $extractDir) { Remove-Item -Recurse -Force $extractDir }
          Expand-Archive -Path $zipOut -DestinationPath $extractDir

          $appExe = Get-ChildItem -Path $extractDir -Filter 'SelfScout Baseball.exe' -Recurse | Select-Object -First 1
          if (-not $appExe) {
            Write-Host 'Files in extracted dir:'
            Get-ChildItem -Recurse -Path $extractDir | Select-Object -First 200 | ForEach-Object { Write-Host $_.FullName }
            throw 'Could not find SelfScout Baseball.exe in extracted zip'
          }

          "APP_EXE=$($appExe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Launch app and detect immediate crash
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not $env:APP_EXE) { throw 'APP_EXE not set' }

          Write-Host "Launching: $env:APP_EXE"
          $proc = Start-Process -FilePath $env:APP_EXE -PassThru
          Start-Sleep -Seconds 25

          if ($proc.HasExited) {
            Write-Host "Process exited early. ExitCode=$($proc.ExitCode)"
            throw 'App exited within 25 seconds (startup failure)'
          }

          Write-Host 'App stayed alive for 25 seconds (startup smoke pass). Stopping process.'
          Stop-Process -Id $proc.Id -Force
